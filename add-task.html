<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow | Add Task</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Add New Task</h1>
    <p>Create a new task with title, description, due date, and priority.</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="add-task.html">Add Task</a>
    <a href="task-list.html">Task List</a>
    <a href="task-detail.html">Task Detail</a>
    <a href="about.html">About / Help</a>
  </nav>

  <main class="container">
    <section class="card">
      <h2>Task Information</h2>

      <form>
        <div>
          <label for="title">Task Title</label>
          <input type="text" id="title" name="title" placeholder="Enter task title">
        </div>

        <div>
          <label for="description">Task Description</label>
          <textarea id="description" name="description" placeholder="Enter task description"></textarea>
        </div>

        <div>
          <label for="due-date">Due Date</label>
          <input type="date" id="due-date" name="due-date">
        </div>

        <div>
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
        </div>

        <button type="submit">Save Task</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>TaskFlow CI/CD Assignment | Add Task page by shahzaibrehman</p>
  </footer>
</body>
</html>
