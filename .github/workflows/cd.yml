name: CD - Deploy to Render

on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Step 1 - Checkout repository
        uses: actions/checkout@v4

      - name: Step 2 - Trigger Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Step 3 - Confirm deployment
        run: echo "Deployment triggered at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"