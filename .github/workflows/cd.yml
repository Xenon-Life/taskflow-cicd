name: CD - Deploy to GitHub Pages

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Prepare GitHub Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout repository
        uses: actions/checkout@v4

      - name: Step 2 - Prepare static site files
        run: |
          mkdir -p dist
          cp ./*.html dist/
          cp ./style.css dist/

      - name: Step 3 - Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Step 4 - Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Step 5 - Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Step 6 - Confirm deployment
        run: echo "GitHub Pages deployment completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
